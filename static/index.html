<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>logq</title>
<style>
:root {
  --bg: #0e1116; --panel: #161b22; --panel2: #1c232c;
  --fg: #e6edf3; --dim: #8b949e; --accent: #58a6ff; --err: #ff7b72;
  --ok: #3fb950; --warn: #d29922; --border: #30363d;
  --mono: ui-monospace, SFMono-Regular, Menlo, monospace;
}
* { box-sizing: border-box; }
html, body { margin: 0; height: 100%; background: var(--bg); color: var(--fg);
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 13px; }
.app { display: grid; grid-template-columns: 240px 1fr 240px; grid-template-rows: 36px 1fr;
  height: 100vh; gap: 1px; background: var(--border); }
.topbar { grid-column: 1 / -1; background: var(--panel); display: flex; align-items: center;
  padding: 0 12px; gap: 12px; }
.topbar h1 { font-size: 14px; margin: 0; font-weight: 600; letter-spacing: 0.5px; }
.topbar .meta { color: var(--dim); font-size: 12px; }
.panel { background: var(--panel); overflow: auto; }
.panel h2 { font-size: 11px; text-transform: uppercase; color: var(--dim);
  margin: 0; padding: 10px 12px; letter-spacing: 0.8px; border-bottom: 1px solid var(--border); }
.center { display: grid; grid-template-rows: auto auto 1fr; background: var(--bg); }
.editor { background: var(--panel2); border-bottom: 1px solid var(--border); padding: 8px; }
.editor textarea { width: 100%; min-height: 80px; background: var(--bg); color: var(--fg);
  border: 1px solid var(--border); border-radius: 4px; font-family: var(--mono);
  font-size: 13px; padding: 8px; resize: vertical; }
.editor .row { display: flex; gap: 8px; margin-top: 6px; align-items: center; }
button { background: var(--accent); color: #0b0f14; border: 0; padding: 6px 12px;
  border-radius: 4px; font-weight: 600; cursor: pointer; font-size: 12px; }
button.secondary { background: var(--panel2); color: var(--fg); border: 1px solid var(--border); }
button:hover { filter: brightness(1.1); }
.histogram { padding: 8px 12px; background: var(--panel2); border-bottom: 1px solid var(--border);
  height: 100px; }
.histogram svg { width: 100%; height: 100%; display: block; }
.results { overflow: auto; }
.results table { border-collapse: collapse; font-family: var(--mono); font-size: 12px; width: 100%; }
.results th { background: var(--panel); position: sticky; top: 0; text-align: left;
  padding: 6px 10px; border-bottom: 1px solid var(--border); font-weight: 600;
  white-space: nowrap; }
.results td { padding: 4px 10px; border-bottom: 1px solid #1f262e; vertical-align: top;
  max-width: 400px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.results td.expand { white-space: pre-wrap; max-width: none; }
.file-item, .col-item, .saved-item { padding: 6px 12px; border-bottom: 1px solid #1f262e;
  cursor: pointer; font-family: var(--mono); font-size: 12px; }
.file-item:hover, .col-item:hover, .saved-item:hover { background: var(--panel2); }
.file-item .size { color: var(--dim); font-size: 11px; float: right; }
.col-item .type { color: var(--dim); font-size: 11px; float: right; }
.saved-item .name { font-weight: 600; }
.saved-item .desc { color: var(--dim); font-size: 11px; }
.saved-item button.del { float: right; background: transparent; color: var(--err); padding: 0 4px; }
.error { color: var(--err); padding: 8px 12px; font-family: var(--mono); font-size: 12px;
  background: rgba(255, 123, 114, 0.1); border-bottom: 1px solid var(--border); }
.status { color: var(--dim); padding: 4px 12px; font-size: 11px; background: var(--panel); }
.facet-section { padding: 8px 12px; border-bottom: 1px solid #1f262e; }
.facet-section h3 { margin: 0 0 4px 0; font-size: 11px; color: var(--accent); }
.facet-val { display: flex; justify-content: space-between; padding: 2px 0; cursor: pointer;
  font-family: var(--mono); font-size: 11px; }
.facet-val:hover { color: var(--accent); }
.facet-val .count { color: var(--dim); }
.json-cell { color: var(--warn); }
.num-cell { color: var(--ok); }
.null-cell { color: var(--dim); font-style: italic; }
.chart-toggle button { font-family: var(--mono); font-size: 11px; padding: 4px 8px; }
.chart-toggle button.active { background: var(--accent); color: #0b0f14; border-color: var(--accent); }
.tail-row { padding: 4px 12px; border-bottom: 1px solid #1f262e; font-family: var(--mono); font-size: 11px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.tail-row .file { color: var(--dim); margin-right: 6px; }
#tail-toggle.on { background: var(--ok); color: #0b0f14; border-color: var(--ok); }
.chart-svg { width: 100%; height: 100%; }

/* Modal */
.modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,0.6); display: none;
  align-items: center; justify-content: center; z-index: 100; }
.modal-bg.show { display: flex; }
.modal { background: var(--panel); border: 1px solid var(--border); border-radius: 8px;
  max-width: 80vw; max-height: 80vh; overflow: auto; padding: 16px; }
.modal h3 { margin: 0 0 8px; font-size: 13px; color: var(--accent); }
.modal pre { background: var(--bg); padding: 12px; border-radius: 4px;
  font-family: var(--mono); font-size: 12px; max-height: 60vh; overflow: auto; }
.modal .close { float: right; cursor: pointer; color: var(--dim); background: transparent;
  border: 0; font-size: 20px; padding: 0; }
.col-stats { font-family: var(--mono); font-size: 12px; min-width: 360px; }
.col-stats .row { display: flex; justify-content: space-between; padding: 3px 0;
  border-bottom: 1px solid #1f262e; }
.col-stats .row .bar { flex: 1; margin: 0 8px; height: 14px; background: var(--bg);
  position: relative; }
.col-stats .row .bar > div { background: var(--accent); height: 100%; opacity: 0.7; }
.col-stats .row .v { color: var(--ok); min-width: 60px; text-align: right; }
.results th { cursor: pointer; }
.results th:hover { background: var(--panel2); color: var(--accent); }

/* Tabs */
.tabs { display: flex; background: var(--panel); border-bottom: 1px solid var(--border); }
.tab { padding: 6px 12px; border-right: 1px solid var(--border); cursor: pointer;
  font-family: var(--mono); font-size: 12px; color: var(--dim);
  display: flex; align-items: center; gap: 6px; max-width: 200px; }
.tab.active { background: var(--panel2); color: var(--fg); }
.tab:hover { color: var(--accent); }
.tab .x { color: var(--dim); cursor: pointer; padding: 0 2px; }
.tab .x:hover { color: var(--err); }
.tab-new { padding: 6px 10px; cursor: pointer; color: var(--accent); font-weight: 600; }

/* Histogram brush */
.histogram { position: relative; user-select: none; }
.brush { position: absolute; top: 8px; bottom: 8px; background: rgba(88,166,255,0.18);
  border-left: 1px solid var(--accent); border-right: 1px solid var(--accent);
  pointer-events: none; display: none; }
.brush.show { display: block; }
.brush-clear { position: absolute; top: 4px; right: 4px; font-size: 10px;
  background: var(--panel); color: var(--dim); border: 1px solid var(--border);
  padding: 2px 6px; border-radius: 3px; cursor: pointer; display: none; }
.brush-clear.show { display: block; }

/* Query history panel */
.history-item { padding: 6px 12px; border-bottom: 1px solid #1f262e; cursor: pointer;
  font-family: var(--mono); font-size: 11px; color: var(--dim);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.history-item:hover { background: var(--panel2); color: var(--fg); }
</style>
</head>
<body>
<div class="modal-bg" id="modal-bg">
  <div class="modal">
    <button class="close" id="modal-close">×</button>
    <h3 id="modal-title"></h3>
    <div id="modal-body"></div>
  </div>
</div>
<div class="app">
  <div class="topbar">
    <h1>logq</h1>
    <span class="meta" id="meta-info"></span>
  </div>

  <div class="panel" id="left">
    <h2>Files</h2>
    <div id="files"></div>
    <h2>Columns</h2>
    <div id="columns"></div>
    <h2>Facets</h2>
    <div id="facets"></div>
  </div>

  <div class="center">
    <div class="tabs" id="tabs"></div>
    <div class="editor">
      <textarea id="sql" spellcheck="false"></textarea>
      <div class="row">
        <button id="run">Run (⌘↵)</button>
        <button class="secondary" id="save">Save…</button>
        <button class="secondary" id="copy-link">Copy link</button>
        <button class="secondary" id="tail-toggle">Live tail: off</button>
        <button class="secondary" id="export-csv">CSV</button>
        <button class="secondary" id="export-parquet">Parquet</button>
        <span class="status" id="status"></span>
        <span style="margin-left:auto" class="chart-toggle">
          <button class="secondary" data-view="table">Table</button>
          <button class="secondary" data-view="bar">Bar</button>
          <button class="secondary" data-view="line">Line</button>
        </span>
      </div>
    </div>
    <div class="histogram" id="hist-wrap">
      <svg id="hist"></svg>
      <div class="brush" id="brush"></div>
      <button class="brush-clear" id="brush-clear">clear range</button>
    </div>
    <div class="results" id="results"></div>
  </div>

  <div class="panel" id="right">
    <h2>Saved Queries</h2>
    <div id="saved"></div>
    <h2>History</h2>
    <div id="history"></div>
    <h2>Live Tail</h2>
    <div id="tail"></div>
  </div>
</div>

<script>
const $ = (s) => document.querySelector(s);
const state = {
  meta: null, lastSql: "", lastResult: null, view: "table", tailWs: null,
  tabs: [], activeTab: 0,
  history: JSON.parse(localStorage.getItem("logq.history") || "[]"),
  brushRange: null, // {from, to} when active
};

const HISTORY_MAX = 100;
function pushHistory(sql) {
  if (!sql || sql.trim().length < 5) return;
  state.history = state.history.filter(h => h !== sql);
  state.history.unshift(sql);
  if (state.history.length > HISTORY_MAX) state.history.length = HISTORY_MAX;
  localStorage.setItem("logq.history", JSON.stringify(state.history));
  renderHistory();
}
function renderHistory() {
  $("#history").innerHTML = state.history.slice(0, 25).map((h, i) =>
    `<div class="history-item" data-i="${i}" title="${h.replace(/"/g, '&quot;')}">${h.replace(/\s+/g, " ").slice(0, 80)}</div>`
  ).join("");
  document.querySelectorAll(".history-item").forEach(el => {
    el.addEventListener("click", () => {
      $("#sql").value = state.history[Number(el.dataset.i)];
      runQuery();
    });
  });
}

function loadTabs() {
  state.tabs = JSON.parse(localStorage.getItem("logq.tabs") || "[]");
  if (state.tabs.length === 0) state.tabs = [{ name: "1", sql: "" }];
  state.activeTab = Math.min(Number(localStorage.getItem("logq.activeTab") || "0"), state.tabs.length - 1);
}
function saveTabs() {
  state.tabs[state.activeTab].sql = $("#sql").value;
  localStorage.setItem("logq.tabs", JSON.stringify(state.tabs));
  localStorage.setItem("logq.activeTab", String(state.activeTab));
}
function renderTabs() {
  $("#tabs").innerHTML = state.tabs.map((t, i) =>
    `<div class="tab ${i === state.activeTab ? 'active' : ''}" data-i="${i}">
       <span>${t.name}</span>
       ${state.tabs.length > 1 ? `<span class="x" data-x="${i}">×</span>` : ''}
     </div>`
  ).join("") + `<div class="tab-new" id="tab-new">+</div>`;
  document.querySelectorAll(".tab").forEach(el => {
    el.addEventListener("click", (e) => {
      if (e.target.dataset.x !== undefined) return;
      saveTabs();
      state.activeTab = Number(el.dataset.i);
      $("#sql").value = state.tabs[state.activeTab].sql;
      renderTabs();
      saveTabs();
    });
  });
  document.querySelectorAll(".tab .x").forEach(el => {
    el.addEventListener("click", (e) => {
      e.stopPropagation();
      const i = Number(el.dataset.x);
      state.tabs.splice(i, 1);
      if (state.activeTab >= state.tabs.length) state.activeTab = state.tabs.length - 1;
      $("#sql").value = state.tabs[state.activeTab].sql;
      renderTabs();
      saveTabs();
    });
  });
  $("#tab-new").addEventListener("click", () => {
    saveTabs();
    const n = state.tabs.length + 1;
    state.tabs.push({ name: String(n), sql: "" });
    state.activeTab = state.tabs.length - 1;
    $("#sql").value = "";
    renderTabs();
    saveTabs();
  });
}

async function api(path, body) {
  const opts = { method: body ? "POST" : "GET", headers: { "Content-Type": "application/json" } };
  if (body) opts.body = JSON.stringify(body);
  const r = await fetch(path, opts);
  return r.json();
}

function fmtBytes(n) {
  if (n < 1024) return n + " B";
  if (n < 1048576) return (n/1024).toFixed(1) + " KB";
  if (n < 1073741824) return (n/1048576).toFixed(1) + " MB";
  return (n/1073741824).toFixed(2) + " GB";
}

function renderMeta(m) {
  state.meta = m;
  $("#meta-info").textContent = `${m.dir} · ${m.files.length} files · ${m.columns.length} columns`
    + (m.timestamp_col ? ` · ts="${m.timestamp_col}"` : "")
    + (m.level_col ? ` · level="${m.level_col}"` : "");

  $("#files").innerHTML = m.files.map(f =>
    `<div class="file-item" data-path="${f.rel_path}">
       <span class="size">${fmtBytes(f.size)}</span>${f.rel_path}
     </div>`).join("");

  $("#columns").innerHTML = m.columns.map(c =>
    `<div class="col-item" data-col="${c.name}">
       <span class="type">${c.type}</span>${c.name}
     </div>`).join("");

  document.querySelectorAll(".col-item").forEach(el => {
    el.addEventListener("click", () => {
      const name = el.dataset.col;
      $("#sql").value = `SELECT "${name}", COUNT(*) AS n FROM logs GROUP BY "${name}" ORDER BY n DESC LIMIT 50`;
      runQuery();
    });
  });

  const urlState = loadUrlState();
  if (urlState && urlState.sql) {
    $("#sql").value = urlState.sql;
    if (urlState.view) {
      state.view = urlState.view;
      document.querySelectorAll(".chart-toggle button").forEach(x => x.classList.toggle("active", x.dataset.view === state.view));
    }
  } else if (m.timestamp_col) {
    $("#sql").value = `SELECT * FROM logs ORDER BY "${m.timestamp_col}" DESC LIMIT 100`;
  } else {
    $("#sql").value = "SELECT * FROM logs LIMIT 100";
  }
  document.querySelectorAll(".chart-toggle button").forEach(x => x.classList.toggle("active", x.dataset.view === state.view));

  loadFacets(m.facets);
  loadHistogram();
  runQuery();
  loadSaved();
}

async function loadFacets(facets) {
  const container = $("#facets");
  container.innerHTML = "";
  for (const f of facets) {
    const r = await api("/api/query", { sql: `SELECT "${f}" AS v, COUNT(*) AS c FROM logs GROUP BY 1 ORDER BY c DESC LIMIT 20` });
    if (r.error) continue;
    const section = document.createElement("div");
    section.className = "facet-section";
    section.innerHTML = `<h3>${f}</h3>` + r.rows.map(row =>
      `<div class="facet-val" data-col="${f}" data-val="${String(row[0]).replace(/"/g,'&quot;')}">
        <span>${row[0]}</span><span class="count">${row[1]}</span>
      </div>`).join("");
    container.appendChild(section);
  }
  document.querySelectorAll(".facet-val").forEach(el => {
    el.addEventListener("click", () => {
      const col = el.dataset.col, val = el.dataset.val;
      $("#sql").value = `SELECT * FROM logs WHERE "${col}" = '${val.replace(/'/g, "''")}' LIMIT 100`;
      runQuery();
    });
  });
}

async function loadHistogram() {
  if (!state.meta?.timestamp_col) return;
  const r = await api("/api/histogram", { buckets: 60 });
  const svg = $("#hist");
  if (r.error || !r.buckets.length) { svg.innerHTML = ""; state.lastHistBuckets = null; return; }
  state.lastHistBuckets = r.buckets;
  const w = svg.clientWidth, h = svg.clientHeight;
  const max = Math.max(...r.buckets.map(b => b.count));
  const bw = w / r.buckets.length;
  svg.innerHTML = r.buckets.map((b, i) => {
    const bh = (b.count / max) * (h - 20);
    return `<rect x="${i*bw}" y="${h-bh}" width="${bw-1}" height="${bh}" fill="#58a6ff" opacity="0.7">
      <title>${b.bucket}: ${b.count}</title></rect>`;
  }).join("") + `<text x="4" y="12" fill="#8b949e" font-size="10" font-family="monospace">${r.column} · ${r.buckets[0].bucket} → ${r.buckets[r.buckets.length-1].bucket}</text>`;
}

function cellHtml(v) {
  if (v === null || v === undefined) return '<span class="null-cell">null</span>';
  if (typeof v === "number") return `<span class="num-cell">${v}</span>`;
  if (typeof v === "object") return `<span class="json-cell">${JSON.stringify(v)}</span>`;
  return String(v).replace(/[<>&]/g, c => ({"<":"&lt;",">":"&gt;","&":"&amp;"}[c]));
}

async function runQuery() {
  let sql = $("#sql").value;
  if (state.brushRange) {
    const col = state.meta?.timestamp_col;
    if (col && !sql.toLowerCase().includes("/* brushed */")) {
      const where = `"${col}" BETWEEN TIMESTAMP '${state.brushRange.from}' AND TIMESTAMP '${state.brushRange.to}'`;
      if (/\bwhere\b/i.test(sql)) {
        sql = sql.replace(/\bwhere\b/i, `WHERE ${where} AND /* brushed */`);
      } else {
        const m = sql.match(/(\s+(group|order|limit)\b)/i);
        if (m) sql = sql.slice(0, m.index) + ` WHERE ${where} /* brushed */` + sql.slice(m.index);
        else sql = sql + ` WHERE ${where} /* brushed */`;
      }
    }
  }
  state.lastSql = sql;
  pushHistory(sql);
  saveTabs();
  syncUrl();
  $("#status").textContent = "running...";
  const r = await api("/api/query", { sql });
  if (r.error) {
    $("#results").innerHTML = `<div class="error">${r.error}</div>`;
    $("#status").textContent = `error · ${r.elapsed_ms}ms`;
    return;
  }
  state.lastResult = r;
  $("#status").textContent = `${r.rows.length} rows · ${r.elapsed_ms}ms`;
  renderView();
}

function renderView() {
  const r = state.lastResult;
  if (!r) return;
  if (state.view === "table") return renderTable(r);
  return renderChart(r, state.view);
}

function renderTable(r) {
  const thead = "<tr>" + r.columns.map((c, i) => `<th data-col="${c}" data-idx="${i}">${c}</th>`).join("") + "</tr>";
  const tbody = r.rows.map(row =>
    "<tr>" + row.map((c, i) => {
      const isObj = c !== null && typeof c === "object";
      const tip = isObj ? JSON.stringify(c).replace(/"/g,'&quot;') : String(c ?? '').replace(/"/g,'&quot;');
      return `<td data-idx="${i}" title="${tip}">${cellHtml(c)}</td>`;
    }).join("") + "</tr>"
  ).join("");
  $("#results").innerHTML = `<table><thead>${thead}</thead><tbody>${tbody}</tbody></table>`;
  // Column-header click: stats modal
  document.querySelectorAll(".results th").forEach(th => {
    th.addEventListener("click", () => openColumnStats(th.dataset.col));
  });
  // Cell click: JSON expand modal for nested data, otherwise inline toggle
  document.querySelectorAll(".results td").forEach(td => {
    td.addEventListener("click", () => {
      const idx = Number(td.dataset.idx);
      const rowEl = td.parentElement;
      const rowIdx = Array.from(rowEl.parentElement.children).indexOf(rowEl);
      const val = r.rows[rowIdx][idx];
      if (val !== null && (typeof val === "object" || (typeof val === "string" && /^[{\[]/.test(val)))) {
        openJsonModal(r.columns[idx], val);
      } else {
        td.classList.toggle("expand");
      }
    });
  });
}

async function openColumnStats(col) {
  showModal(`Column · ${col}`, `<div class="col-stats">loading…</div>`);
  const r = await api("/api/column-stats", { column: col, sql: state.lastSql });
  if (r.error) {
    $("#modal-body").innerHTML = `<div class="error">${r.error}</div>`;
    return;
  }
  const max = Math.max(...r.top_values.map(([, c]) => c), 1);
  const rows = r.top_values.map(([label, count]) => `
    <div class="row">
      <span style="flex:0 0 200px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">${escapeHtml(label)}</span>
      <span class="bar"><div style="width:${(count/max*100).toFixed(1)}%"></div></span>
      <span class="v">${count}</span>
    </div>
  `).join("");
  $("#modal-body").innerHTML = `<div class="col-stats">
    <div style="color:var(--dim); margin-bottom:6px;">distinct: ${r.distinct ?? "?"} · top 25 values${state.lastSql ? " (in current query)" : ""}</div>
    ${rows}
  </div>`;
}

function openJsonModal(col, val) {
  let parsed = val;
  if (typeof val === "string") { try { parsed = JSON.parse(val); } catch (e) {} }
  const pretty = typeof parsed === "object" ? JSON.stringify(parsed, null, 2) : String(parsed);
  showModal(`Cell · ${col}`, `<pre>${escapeHtml(pretty)}</pre>`);
}

function showModal(title, html) {
  $("#modal-title").textContent = title;
  $("#modal-body").innerHTML = html;
  $("#modal-bg").classList.add("show");
}
function escapeHtml(s) {
  return String(s).replace(/[<>&"]/g, c => ({"<":"&lt;",">":"&gt;","&":"&amp;","\"":"&quot;"}[c]));
}

document.addEventListener("click", (e) => {
  if (e.target.id === "modal-close" || e.target.id === "modal-bg") {
    $("#modal-bg").classList.remove("show");
  }
});

async function exportAs(fmt) {
  const sql = $("#sql").value;
  const r = await fetch("/api/export", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ sql, format: fmt }),
  });
  if (!r.ok) {
    const j = await r.json().catch(() => ({}));
    alert("Export failed: " + (j.error || r.statusText));
    return;
  }
  const blob = await r.blob();
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = `logq-export.${fmt === "parquet" ? "parquet" : fmt}`;
  a.click();
  URL.revokeObjectURL(url);
}
$("#export-csv").addEventListener("click", () => exportAs("csv"));
$("#export-parquet").addEventListener("click", () => exportAs("parquet"));

function renderChart(r, kind) {
  if (r.columns.length < 2 || r.rows.length === 0) {
    $("#results").innerHTML = `<div class="error">Chart needs ≥2 columns and rows. Try a GROUP BY query.</div>`;
    return;
  }
  // Last numeric col is Y; first col is X.
  const yIdx = r.columns.length - 1;
  const xIdx = 0;
  const vals = r.rows.map(row => Number(row[yIdx]) || 0);
  const labels = r.rows.map(row => String(row[xIdx] ?? ""));
  const max = Math.max(...vals, 1);
  const w = 1000, h = 360, padL = 60, padB = 40, padT = 16, padR = 16;
  const innerW = w - padL - padR, innerH = h - padT - padB;
  const n = vals.length;
  let body;
  if (kind === "bar") {
    const bw = innerW / n;
    body = vals.map((v, i) => {
      const bh = (v / max) * innerH;
      const x = padL + i * bw, y = padT + innerH - bh;
      return `<rect x="${x+1}" y="${y}" width="${Math.max(1, bw-2)}" height="${bh}" fill="#58a6ff" opacity="0.8">
        <title>${labels[i]}: ${v}</title></rect>`;
    }).join("");
  } else {
    const sx = (i) => padL + (n === 1 ? innerW/2 : (i * innerW) / (n - 1));
    const sy = (v) => padT + innerH - (v / max) * innerH;
    const pts = vals.map((v, i) => `${sx(i)},${sy(v)}`).join(" ");
    body = `<polyline fill="none" stroke="#58a6ff" stroke-width="2" points="${pts}" />` +
      vals.map((v, i) => `<circle cx="${sx(i)}" cy="${sy(v)}" r="3" fill="#58a6ff"><title>${labels[i]}: ${v}</title></circle>`).join("");
  }
  // Axes
  const axes = `
    <line x1="${padL}" y1="${padT}" x2="${padL}" y2="${padT+innerH}" stroke="#30363d" />
    <line x1="${padL}" y1="${padT+innerH}" x2="${padL+innerW}" y2="${padT+innerH}" stroke="#30363d" />
    <text x="${padL-6}" y="${padT+10}" fill="#8b949e" font-size="10" text-anchor="end">${max}</text>
    <text x="${padL-6}" y="${padT+innerH}" fill="#8b949e" font-size="10" text-anchor="end">0</text>
    <text x="${padL}" y="${padT+innerH+14}" fill="#8b949e" font-size="10">${labels[0]}</text>
    <text x="${padL+innerW}" y="${padT+innerH+14}" fill="#8b949e" font-size="10" text-anchor="end">${labels[n-1]}</text>
    <text x="${padL}" y="${padT-4}" fill="#8b949e" font-size="11">${r.columns[xIdx]} → ${r.columns[yIdx]}</text>
  `;
  $("#results").innerHTML = `<svg class="chart-svg" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none">${axes}${body}</svg>`;
}

function syncUrl() {
  try {
    const payload = { sql: state.lastSql, view: state.view };
    const enc = btoa(unescape(encodeURIComponent(JSON.stringify(payload))));
    history.replaceState(null, "", "#q=" + enc);
  } catch (e) {}
}

function loadUrlState() {
  const h = location.hash;
  if (!h.startsWith("#q=")) return null;
  try {
    const json = decodeURIComponent(escape(atob(h.slice(3))));
    return JSON.parse(json);
  } catch (e) { return null; }
}

document.querySelectorAll(".chart-toggle button").forEach(b => {
  b.addEventListener("click", () => {
    state.view = b.dataset.view;
    document.querySelectorAll(".chart-toggle button").forEach(x => x.classList.toggle("active", x === b));
    syncUrl();
    renderView();
  });
});

$("#copy-link").addEventListener("click", async () => {
  syncUrl();
  await navigator.clipboard.writeText(location.href);
  const old = $("#copy-link").textContent;
  $("#copy-link").textContent = "Copied!";
  setTimeout(() => $("#copy-link").textContent = old, 1200);
});

$("#tail-toggle").addEventListener("click", async () => {
  const btn = $("#tail-toggle");
  if (state.tailWs) {
    state.tailWs.close();
    state.tailWs = null;
    btn.classList.remove("on");
    btn.textContent = "Live tail: off";
    return;
  }
  await fetch("/api/tail/start", { method: "POST" });
  const proto = location.protocol === "https:" ? "wss:" : "ws:";
  const ws = new WebSocket(`${proto}//${location.host}/api/tail`);
  state.tailWs = ws;
  ws.onmessage = (e) => {
    try {
      const msg = JSON.parse(e.data);
      const div = document.createElement("div");
      div.className = "tail-row";
      const file = msg.file.split("/").pop();
      div.innerHTML = `<span class="file">${file}</span>${(msg.line||"").slice(0,300).replace(/[<>&]/g, c => ({"<":"&lt;",">":"&gt;","&":"&amp;"}[c]))}`;
      const tail = $("#tail");
      tail.insertBefore(div, tail.firstChild);
      while (tail.children.length > 200) tail.removeChild(tail.lastChild);
    } catch (err) {}
  };
  ws.onclose = () => {
    if (state.tailWs === ws) {
      state.tailWs = null;
      btn.classList.remove("on");
      btn.textContent = "Live tail: off";
    }
  };
  btn.classList.add("on");
  btn.textContent = "Live tail: on";
});

async function loadSaved() {
  const r = await api("/api/saved");
  $("#saved").innerHTML = (r.queries || []).map(q => `
    <div class="saved-item" data-name="${q.name}">
      <button class="del" data-del="${q.name}">×</button>
      <div class="name">${q.name}</div>
      ${q.description ? `<div class="desc">${q.description}</div>` : ""}
    </div>
  `).join("");
  document.querySelectorAll(".saved-item").forEach(el => {
    el.addEventListener("click", (e) => {
      if (e.target.dataset.del) return;
      const q = (r.queries || []).find(x => x.name === el.dataset.name);
      if (q) { $("#sql").value = q.sql; runQuery(); }
    });
  });
  document.querySelectorAll("[data-del]").forEach(b => {
    b.addEventListener("click", async (e) => {
      e.stopPropagation();
      await api("/api/saved/delete", { name: b.dataset.del });
      loadSaved();
    });
  });
}

$("#run").addEventListener("click", runQuery);
$("#save").addEventListener("click", async () => {
  const name = prompt("Query name?");
  if (!name) return;
  const desc = prompt("Description (optional)?") || "";
  await api("/api/saved", { name, sql: $("#sql").value, description: desc });
  loadSaved();
});
$("#sql").addEventListener("keydown", (e) => {
  if ((e.metaKey || e.ctrlKey) && e.key === "Enter") { e.preventDefault(); runQuery(); }
});

// Brush selection on histogram
(function setupBrush() {
  const wrap = $("#hist-wrap");
  const brush = $("#brush");
  const clearBtn = $("#brush-clear");
  let downX = null;
  wrap.addEventListener("mousedown", (e) => {
    if (e.target.id === "brush-clear") return;
    const rect = wrap.getBoundingClientRect();
    downX = e.clientX - rect.left;
    brush.style.left = downX + "px";
    brush.style.width = "0px";
    brush.classList.add("show");
  });
  window.addEventListener("mousemove", (e) => {
    if (downX === null) return;
    const rect = wrap.getBoundingClientRect();
    const x = Math.max(0, Math.min(rect.width, e.clientX - rect.left));
    const left = Math.min(downX, x);
    const w = Math.abs(x - downX);
    brush.style.left = left + "px";
    brush.style.width = w + "px";
  });
  window.addEventListener("mouseup", (e) => {
    if (downX === null) return;
    const rect = wrap.getBoundingClientRect();
    const x = Math.max(0, Math.min(rect.width, e.clientX - rect.left));
    const left = Math.min(downX, x);
    const right = Math.max(downX, x);
    downX = null;
    if (Math.abs(right - left) < 5) {
      brush.classList.remove("show");
      clearBtn.classList.remove("show");
      state.brushRange = null;
      return;
    }
    // Map pixel range to timestamps via current histogram bucket labels
    const buckets = state.lastHistBuckets;
    if (!buckets || buckets.length === 0) return;
    const px = rect.width;
    const iLeft = Math.floor((left / px) * buckets.length);
    const iRight = Math.min(buckets.length - 1, Math.floor((right / px) * buckets.length));
    state.brushRange = {
      from: buckets[iLeft].bucket.replace(/\+\d{2}:\d{2}$/, "").replace("T", " "),
      to:   buckets[iRight].bucket.replace(/\+\d{2}:\d{2}$/, "").replace("T", " "),
    };
    clearBtn.classList.add("show");
    runQuery();
  });
  clearBtn.addEventListener("click", () => {
    state.brushRange = null;
    brush.classList.remove("show");
    clearBtn.classList.remove("show");
    runQuery();
  });
})();

loadTabs();
renderTabs();
renderHistory();
api("/api/meta").then(renderMeta);
</script>
