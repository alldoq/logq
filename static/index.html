<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>logq</title>
<style>
:root {
  --bg: #0e1116; --panel: #161b22; --panel2: #1c232c;
  --fg: #e6edf3; --dim: #8b949e; --accent: #58a6ff; --err: #ff7b72;
  --ok: #3fb950; --warn: #d29922; --border: #30363d;
  --mono: ui-monospace, SFMono-Regular, Menlo, monospace;
}
* { box-sizing: border-box; }
html, body { margin: 0; height: 100%; background: var(--bg); color: var(--fg);
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 13px; }
.app { display: grid; grid-template-columns: 240px 1fr 240px; grid-template-rows: 36px 1fr;
  height: 100vh; gap: 1px; background: var(--border); }
.topbar { grid-column: 1 / -1; background: var(--panel); display: flex; align-items: center;
  padding: 0 12px; gap: 12px; }
.topbar h1 { font-size: 14px; margin: 0; font-weight: 600; letter-spacing: 0.5px; }
.topbar .meta { color: var(--dim); font-size: 12px; }
.panel { background: var(--panel); overflow: auto; }
.panel h2 { font-size: 11px; text-transform: uppercase; color: var(--dim);
  margin: 0; padding: 10px 12px; letter-spacing: 0.8px; border-bottom: 1px solid var(--border); }
.center { display: grid; grid-template-rows: auto auto 1fr; background: var(--bg); }
.editor { background: var(--panel2); border-bottom: 1px solid var(--border); padding: 8px; }
.editor textarea { width: 100%; min-height: 80px; background: var(--bg); color: var(--fg);
  border: 1px solid var(--border); border-radius: 4px; font-family: var(--mono);
  font-size: 13px; padding: 8px; resize: vertical; }
.editor .row { display: flex; gap: 8px; margin-top: 6px; align-items: center; }
button { background: var(--accent); color: #0b0f14; border: 0; padding: 6px 12px;
  border-radius: 4px; font-weight: 600; cursor: pointer; font-size: 12px; }
button.secondary { background: var(--panel2); color: var(--fg); border: 1px solid var(--border); }
button:hover { filter: brightness(1.1); }
.histogram { padding: 8px 12px; background: var(--panel2); border-bottom: 1px solid var(--border);
  height: 100px; }
.histogram svg { width: 100%; height: 100%; display: block; }
.results { overflow: auto; }
.results table { border-collapse: collapse; font-family: var(--mono); font-size: 12px; width: 100%; }
.results th { background: var(--panel); position: sticky; top: 0; text-align: left;
  padding: 6px 10px; border-bottom: 1px solid var(--border); font-weight: 600;
  white-space: nowrap; }
.results td { padding: 4px 10px; border-bottom: 1px solid #1f262e; vertical-align: top;
  max-width: 400px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.results td.expand { white-space: pre-wrap; max-width: none; }
.file-item, .col-item, .saved-item { padding: 6px 12px; border-bottom: 1px solid #1f262e;
  cursor: pointer; font-family: var(--mono); font-size: 12px; }
.file-item:hover, .col-item:hover, .saved-item:hover { background: var(--panel2); }
.file-item .size { color: var(--dim); font-size: 11px; float: right; }
.col-item .type { color: var(--dim); font-size: 11px; float: right; }
.saved-item .name { font-weight: 600; }
.saved-item .desc { color: var(--dim); font-size: 11px; }
.saved-item button.del { float: right; background: transparent; color: var(--err); padding: 0 4px; }
.error { color: var(--err); padding: 8px 12px; font-family: var(--mono); font-size: 12px;
  background: rgba(255, 123, 114, 0.1); border-bottom: 1px solid var(--border); }
.status { color: var(--dim); padding: 4px 12px; font-size: 11px; background: var(--panel); }
.facet-section { padding: 8px 12px; border-bottom: 1px solid #1f262e; }
.facet-section h3 { margin: 0 0 4px 0; font-size: 11px; color: var(--accent); }
.facet-val { display: flex; justify-content: space-between; padding: 2px 0; cursor: pointer;
  font-family: var(--mono); font-size: 11px; }
.facet-val:hover { color: var(--accent); }
.facet-val .count { color: var(--dim); }
.json-cell { color: var(--warn); }
.num-cell { color: var(--ok); }
.null-cell { color: var(--dim); font-style: italic; }
.chart-toggle button { font-family: var(--mono); font-size: 11px; padding: 4px 8px; }
.chart-toggle button.active { background: var(--accent); color: #0b0f14; border-color: var(--accent); }
.tail-row { padding: 4px 12px; border-bottom: 1px solid #1f262e; font-family: var(--mono); font-size: 11px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.tail-row .file { color: var(--dim); margin-right: 6px; }
#tail-toggle.on { background: var(--ok); color: #0b0f14; border-color: var(--ok); }
.chart-svg { width: 100%; height: 100%; }
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <h1>logq</h1>
    <span class="meta" id="meta-info"></span>
  </div>

  <div class="panel" id="left">
    <h2>Files</h2>
    <div id="files"></div>
    <h2>Columns</h2>
    <div id="columns"></div>
    <h2>Facets</h2>
    <div id="facets"></div>
  </div>

  <div class="center">
    <div class="editor">
      <textarea id="sql" spellcheck="false"></textarea>
      <div class="row">
        <button id="run">Run (⌘↵)</button>
        <button class="secondary" id="save">Save…</button>
        <button class="secondary" id="copy-link">Copy link</button>
        <button class="secondary" id="tail-toggle">Live tail: off</button>
        <span class="status" id="status"></span>
        <span style="margin-left:auto" class="chart-toggle">
          <button class="secondary" data-view="table">Table</button>
          <button class="secondary" data-view="bar">Bar</button>
          <button class="secondary" data-view="line">Line</button>
        </span>
      </div>
    </div>
    <div class="histogram"><svg id="hist"></svg></div>
    <div class="results" id="results"></div>
  </div>

  <div class="panel" id="right">
    <h2>Saved Queries</h2>
    <div id="saved"></div>
    <h2>Live Tail</h2>
    <div id="tail"></div>
  </div>
</div>

<script>
const $ = (s) => document.querySelector(s);
const state = { meta: null, lastSql: "", lastResult: null, view: "table", tailWs: null };

async function api(path, body) {
  const opts = { method: body ? "POST" : "GET", headers: { "Content-Type": "application/json" } };
  if (body) opts.body = JSON.stringify(body);
  const r = await fetch(path, opts);
  return r.json();
}

function fmtBytes(n) {
  if (n < 1024) return n + " B";
  if (n < 1048576) return (n/1024).toFixed(1) + " KB";
  if (n < 1073741824) return (n/1048576).toFixed(1) + " MB";
  return (n/1073741824).toFixed(2) + " GB";
}

function renderMeta(m) {
  state.meta = m;
  $("#meta-info").textContent = `${m.dir} · ${m.files.length} files · ${m.columns.length} columns`
    + (m.timestamp_col ? ` · ts="${m.timestamp_col}"` : "")
    + (m.level_col ? ` · level="${m.level_col}"` : "");

  $("#files").innerHTML = m.files.map(f =>
    `<div class="file-item" data-path="${f.rel_path}">
       <span class="size">${fmtBytes(f.size)}</span>${f.rel_path}
     </div>`).join("");

  $("#columns").innerHTML = m.columns.map(c =>
    `<div class="col-item" data-col="${c.name}">
       <span class="type">${c.type}</span>${c.name}
     </div>`).join("");

  document.querySelectorAll(".col-item").forEach(el => {
    el.addEventListener("click", () => {
      const name = el.dataset.col;
      $("#sql").value = `SELECT "${name}", COUNT(*) AS n FROM logs GROUP BY "${name}" ORDER BY n DESC LIMIT 50`;
      runQuery();
    });
  });

  const urlState = loadUrlState();
  if (urlState && urlState.sql) {
    $("#sql").value = urlState.sql;
    if (urlState.view) {
      state.view = urlState.view;
      document.querySelectorAll(".chart-toggle button").forEach(x => x.classList.toggle("active", x.dataset.view === state.view));
    }
  } else if (m.timestamp_col) {
    $("#sql").value = `SELECT * FROM logs ORDER BY "${m.timestamp_col}" DESC LIMIT 100`;
  } else {
    $("#sql").value = "SELECT * FROM logs LIMIT 100";
  }
  document.querySelectorAll(".chart-toggle button").forEach(x => x.classList.toggle("active", x.dataset.view === state.view));

  loadFacets(m.facets);
  loadHistogram();
  runQuery();
  loadSaved();
}

async function loadFacets(facets) {
  const container = $("#facets");
  container.innerHTML = "";
  for (const f of facets) {
    const r = await api("/api/query", { sql: `SELECT "${f}" AS v, COUNT(*) AS c FROM logs GROUP BY 1 ORDER BY c DESC LIMIT 20` });
    if (r.error) continue;
    const section = document.createElement("div");
    section.className = "facet-section";
    section.innerHTML = `<h3>${f}</h3>` + r.rows.map(row =>
      `<div class="facet-val" data-col="${f}" data-val="${String(row[0]).replace(/"/g,'&quot;')}">
        <span>${row[0]}</span><span class="count">${row[1]}</span>
      </div>`).join("");
    container.appendChild(section);
  }
  document.querySelectorAll(".facet-val").forEach(el => {
    el.addEventListener("click", () => {
      const col = el.dataset.col, val = el.dataset.val;
      $("#sql").value = `SELECT * FROM logs WHERE "${col}" = '${val.replace(/'/g, "''")}' LIMIT 100`;
      runQuery();
    });
  });
}

async function loadHistogram() {
  if (!state.meta?.timestamp_col) return;
  const r = await api("/api/histogram", { buckets: 60 });
  const svg = $("#hist");
  if (r.error || !r.buckets.length) { svg.innerHTML = ""; return; }
  const w = svg.clientWidth, h = svg.clientHeight;
  const max = Math.max(...r.buckets.map(b => b.count));
  const bw = w / r.buckets.length;
  svg.innerHTML = r.buckets.map((b, i) => {
    const bh = (b.count / max) * (h - 20);
    return `<rect x="${i*bw}" y="${h-bh}" width="${bw-1}" height="${bh}" fill="#58a6ff" opacity="0.7">
      <title>${b.bucket}: ${b.count}</title></rect>`;
  }).join("") + `<text x="4" y="12" fill="#8b949e" font-size="10" font-family="monospace">${r.column} · ${r.buckets[0].bucket} → ${r.buckets[r.buckets.length-1].bucket}</text>`;
}

function cellHtml(v) {
  if (v === null || v === undefined) return '<span class="null-cell">null</span>';
  if (typeof v === "number") return `<span class="num-cell">${v}</span>`;
  if (typeof v === "object") return `<span class="json-cell">${JSON.stringify(v)}</span>`;
  return String(v).replace(/[<>&]/g, c => ({"<":"&lt;",">":"&gt;","&":"&amp;"}[c]));
}

async function runQuery() {
  const sql = $("#sql").value;
  state.lastSql = sql;
  syncUrl();
  $("#status").textContent = "running...";
  const r = await api("/api/query", { sql });
  if (r.error) {
    $("#results").innerHTML = `<div class="error">${r.error}</div>`;
    $("#status").textContent = `error · ${r.elapsed_ms}ms`;
    return;
  }
  state.lastResult = r;
  $("#status").textContent = `${r.rows.length} rows · ${r.elapsed_ms}ms`;
  renderView();
}

function renderView() {
  const r = state.lastResult;
  if (!r) return;
  if (state.view === "table") return renderTable(r);
  return renderChart(r, state.view);
}

function renderTable(r) {
  const thead = "<tr>" + r.columns.map(c => `<th>${c}</th>`).join("") + "</tr>";
  const tbody = r.rows.map(row =>
    "<tr>" + row.map(c => `<td title="${typeof c === 'object' ? JSON.stringify(c).replace(/"/g,'&quot;') : String(c ?? '').replace(/"/g,'&quot;')}">${cellHtml(c)}</td>`).join("") + "</tr>"
  ).join("");
  $("#results").innerHTML = `<table><thead>${thead}</thead><tbody>${tbody}</tbody></table>`;
  document.querySelectorAll(".results td").forEach(td => {
    td.addEventListener("click", () => td.classList.toggle("expand"));
  });
}

function renderChart(r, kind) {
  if (r.columns.length < 2 || r.rows.length === 0) {
    $("#results").innerHTML = `<div class="error">Chart needs ≥2 columns and rows. Try a GROUP BY query.</div>`;
    return;
  }
  // Last numeric col is Y; first col is X.
  const yIdx = r.columns.length - 1;
  const xIdx = 0;
  const vals = r.rows.map(row => Number(row[yIdx]) || 0);
  const labels = r.rows.map(row => String(row[xIdx] ?? ""));
  const max = Math.max(...vals, 1);
  const w = 1000, h = 360, padL = 60, padB = 40, padT = 16, padR = 16;
  const innerW = w - padL - padR, innerH = h - padT - padB;
  const n = vals.length;
  let body;
  if (kind === "bar") {
    const bw = innerW / n;
    body = vals.map((v, i) => {
      const bh = (v / max) * innerH;
      const x = padL + i * bw, y = padT + innerH - bh;
      return `<rect x="${x+1}" y="${y}" width="${Math.max(1, bw-2)}" height="${bh}" fill="#58a6ff" opacity="0.8">
        <title>${labels[i]}: ${v}</title></rect>`;
    }).join("");
  } else {
    const sx = (i) => padL + (n === 1 ? innerW/2 : (i * innerW) / (n - 1));
    const sy = (v) => padT + innerH - (v / max) * innerH;
    const pts = vals.map((v, i) => `${sx(i)},${sy(v)}`).join(" ");
    body = `<polyline fill="none" stroke="#58a6ff" stroke-width="2" points="${pts}" />` +
      vals.map((v, i) => `<circle cx="${sx(i)}" cy="${sy(v)}" r="3" fill="#58a6ff"><title>${labels[i]}: ${v}</title></circle>`).join("");
  }
  // Axes
  const axes = `
    <line x1="${padL}" y1="${padT}" x2="${padL}" y2="${padT+innerH}" stroke="#30363d" />
    <line x1="${padL}" y1="${padT+innerH}" x2="${padL+innerW}" y2="${padT+innerH}" stroke="#30363d" />
    <text x="${padL-6}" y="${padT+10}" fill="#8b949e" font-size="10" text-anchor="end">${max}</text>
    <text x="${padL-6}" y="${padT+innerH}" fill="#8b949e" font-size="10" text-anchor="end">0</text>
    <text x="${padL}" y="${padT+innerH+14}" fill="#8b949e" font-size="10">${labels[0]}</text>
    <text x="${padL+innerW}" y="${padT+innerH+14}" fill="#8b949e" font-size="10" text-anchor="end">${labels[n-1]}</text>
    <text x="${padL}" y="${padT-4}" fill="#8b949e" font-size="11">${r.columns[xIdx]} → ${r.columns[yIdx]}</text>
  `;
  $("#results").innerHTML = `<svg class="chart-svg" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none">${axes}${body}</svg>`;
}

function syncUrl() {
  try {
    const payload = { sql: state.lastSql, view: state.view };
    const enc = btoa(unescape(encodeURIComponent(JSON.stringify(payload))));
    history.replaceState(null, "", "#q=" + enc);
  } catch (e) {}
}

function loadUrlState() {
  const h = location.hash;
  if (!h.startsWith("#q=")) return null;
  try {
    const json = decodeURIComponent(escape(atob(h.slice(3))));
    return JSON.parse(json);
  } catch (e) { return null; }
}

document.querySelectorAll(".chart-toggle button").forEach(b => {
  b.addEventListener("click", () => {
    state.view = b.dataset.view;
    document.querySelectorAll(".chart-toggle button").forEach(x => x.classList.toggle("active", x === b));
    syncUrl();
    renderView();
  });
});

$("#copy-link").addEventListener("click", async () => {
  syncUrl();
  await navigator.clipboard.writeText(location.href);
  const old = $("#copy-link").textContent;
  $("#copy-link").textContent = "Copied!";
  setTimeout(() => $("#copy-link").textContent = old, 1200);
});

$("#tail-toggle").addEventListener("click", async () => {
  const btn = $("#tail-toggle");
  if (state.tailWs) {
    state.tailWs.close();
    state.tailWs = null;
    btn.classList.remove("on");
    btn.textContent = "Live tail: off";
    return;
  }
  await fetch("/api/tail/start", { method: "POST" });
  const proto = location.protocol === "https:" ? "wss:" : "ws:";
  const ws = new WebSocket(`${proto}//${location.host}/api/tail`);
  state.tailWs = ws;
  ws.onmessage = (e) => {
    try {
      const msg = JSON.parse(e.data);
      const div = document.createElement("div");
      div.className = "tail-row";
      const file = msg.file.split("/").pop();
      div.innerHTML = `<span class="file">${file}</span>${(msg.line||"").slice(0,300).replace(/[<>&]/g, c => ({"<":"&lt;",">":"&gt;","&":"&amp;"}[c]))}`;
      const tail = $("#tail");
      tail.insertBefore(div, tail.firstChild);
      while (tail.children.length > 200) tail.removeChild(tail.lastChild);
    } catch (err) {}
  };
  ws.onclose = () => {
    if (state.tailWs === ws) {
      state.tailWs = null;
      btn.classList.remove("on");
      btn.textContent = "Live tail: off";
    }
  };
  btn.classList.add("on");
  btn.textContent = "Live tail: on";
});

async function loadSaved() {
  const r = await api("/api/saved");
  $("#saved").innerHTML = (r.queries || []).map(q => `
    <div class="saved-item" data-name="${q.name}">
      <button class="del" data-del="${q.name}">×</button>
      <div class="name">${q.name}</div>
      ${q.description ? `<div class="desc">${q.description}</div>` : ""}
    </div>
  `).join("");
  document.querySelectorAll(".saved-item").forEach(el => {
    el.addEventListener("click", (e) => {
      if (e.target.dataset.del) return;
      const q = (r.queries || []).find(x => x.name === el.dataset.name);
      if (q) { $("#sql").value = q.sql; runQuery(); }
    });
  });
  document.querySelectorAll("[data-del]").forEach(b => {
    b.addEventListener("click", async (e) => {
      e.stopPropagation();
      await api("/api/saved/delete", { name: b.dataset.del });
      loadSaved();
    });
  });
}

$("#run").addEventListener("click", runQuery);
$("#save").addEventListener("click", async () => {
  const name = prompt("Query name?");
  if (!name) return;
  const desc = prompt("Description (optional)?") || "";
  await api("/api/saved", { name, sql: $("#sql").value, description: desc });
  loadSaved();
});
$("#sql").addEventListener("keydown", (e) => {
  if ((e.metaKey || e.ctrlKey) && e.key === "Enter") { e.preventDefault(); runQuery(); }
});

api("/api/meta").then(renderMeta);
</script>
</body>
</html>
